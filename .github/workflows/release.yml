name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.96

      - name: Verify tag matches Cargo version
        id: version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -eu
          version="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "roosty") | .version')"
          case "$RELEASE_TAG" in
            "$version"|"v$version") ;;
            *)
              printf 'tag %s does not match Cargo version %s\n' "$RELEASE_TAG" "$version" >&2
              exit 1
              ;;
          esac
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: cargo build --release --locked -p roosty

      - name: Package release binary
        id: package
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -eu
          asset="roosty-${RELEASE_TAG}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir -p dist
          tar -C target/release -czf "dist/$asset" roosty
          sha256sum "dist/$asset" > "dist/$asset.sha256"
          printf 'asset=%s\n' "$asset" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/${{ steps.package.outputs.asset }}
            dist/${{ steps.package.outputs.asset }}.sha256
