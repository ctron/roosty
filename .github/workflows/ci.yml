name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  LEPTOS_WASM_OPT_VERSION: version_131

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Install Cargo Binstall
        shell: bash
        run: |
          set -euo pipefail
          curl -L --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh \
            | bash

      - name: Install frontend build tools
        run: |
          cargo binstall \
            --no-confirm \
            --locked \
            --disable-telemetry \
            cargo-leptos \
            wasm-bindgen-cli

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint Rust workspace
        run: cargo clippy --workspace --all-targets --locked

      - name: Test Rust workspace
        run: cargo test --workspace --locked -- --test-threads=8

      - name: Build server-rendered and hydrated frontend
        run: cargo leptos build --release --lib-cargo-args=--locked --bin-cargo-args=--locked
