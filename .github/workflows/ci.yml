name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Install Cargo Leptos
        run: cargo install cargo-leptos --version 0.3.7 --locked

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint Rust workspace
        run: cargo clippy --workspace --all-targets --locked

      - name: Test Rust workspace
        run: cargo test --workspace --locked -- --test-threads=8

      - name: Build server-rendered and hydrated frontend
        run: cargo leptos build --release --lib-cargo-args=--locked --bin-cargo-args=--locked
