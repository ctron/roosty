name: Container

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: container-main
  cancel-in-progress: false

jobs:
  build:
    if: github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - architecture: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Restore Cargo build cache
        uses: actions/cache@v6
        with:
          path: ${{ runner.temp }}/cargo-build-cache
          key: ${{ runner.os }}-${{ matrix.architecture }}-cargo-build-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.architecture }}-cargo-build-

      - name: Inject Cargo build cache into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3.4.0
        with:
          dockerfile: deploy/Containerfile
          cache-dir: ${{ runner.temp }}/cargo-build-cache

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Containerfile
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=roosty-container-${{ matrix.architecture }}
          cache-to: type=gha,mode=max,scope=roosty-container-${{ matrix.architecture }}

      - name: Export image digest
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: Upload image digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.architecture }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download image digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-architecture manifests
        run: |
          references=()
          for digest in "${RUNNER_TEMP}"/digests/*; do
            references+=("ghcr.io/${{ github.repository }}@sha256:${digest##*/}")
          done
          docker buildx imagetools create \
            --tag "ghcr.io/${{ github.repository }}:main" \
            --tag "ghcr.io/${{ github.repository }}:sha-${{ github.event.workflow_run.head_sha }}" \
            "${references[@]}"
