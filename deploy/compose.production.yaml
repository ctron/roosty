services:
  roosty:
    image: ghcr.io/ctron/roosty:${ROOSTY_IMAGE_TAG:-main}
    command: ["serve", "--with-migrations", "--with-worker"]
    env_file:
      - .env
      - secrets.env
    environment:
      ROOSTY_LISTEN_ADDR: 0.0.0.0:4000
      ROOSTY_INFRA_LISTEN_ADDR: 0.0.0.0:3001
      ROOSTY_MEDIA_ROOT: /var/lib/roosty/media
      ROOSTY_WEB_ROOT: /usr/local/share/roosty/site
    volumes:
      - roosty-media:/var/lib/roosty/media
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "--output", "/dev/null", "http://127.0.0.1:3001/readyz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 1m
    restart: unless-stopped

  caddy:
    build:
      context: .
      dockerfile: Caddy.Containerfile
      args:
        PHANPY_VERSION: ${ROOSTY_PHANPY_VERSION:?ROOSTY_PHANPY_VERSION must be set}
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      roosty:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "--output", "/dev/null", "http://127.0.0.1:2019/config/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  elk:
    image: ghcr.io/elk-zone/elk:v1.0.0
    profiles: ["elk"]
    env_file: .env
    environment:
      NUXT_PUBLIC_DEFAULT_SERVER: ${ROOSTY_DOMAIN}
      NUXT_PUBLIC_SINGLE_INSTANCE: "true"
      NUXT_STORAGE_DRIVER: fs
    volumes:
      - elk-data:/elk/data
    depends_on:
      roosty:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          require('http').get('http://127.0.0.1:5314/', response => { response.resume(); response.on('end', () => process.exit(response.statusCode === 200 ? 0 : 1)); }).on('error', () => process.exit(1));
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:18
    env_file: secrets.env
    environment:
      POSTGRES_DB: roosty
      POSTGRES_USER: roosty
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roosty -d roosty"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql
    restart: unless-stopped

volumes:
  caddy-config:
  caddy-data:
  elk-data:
  postgres-data:
  roosty-media:
