services:
  roosty:
    build:
      context: ..
      dockerfile: deploy/Containerfile
    command: ["serve", "--with-migrations", "--with-worker"]
    environment:
      ROOSTY_DATABASE_URL: postgres://roosty:roosty@postgres:5432/roosty # pragma: allowlist secret
      ROOSTY_PUBLIC_BASE_URL: https://roosty.localhost:4000
      ROOSTY_LISTEN_ADDR: 0.0.0.0:4000
      ROOSTY_INFRA_LISTEN_ADDR: 0.0.0.0:3001
      ROOSTY_SESSION_SECRET: development-session-secret-change-me-000 # pragma: allowlist secret
      ROOSTY_TOKEN_PEPPER: development-token-pepper-change-me-0000 # pragma: allowlist secret
      ROOSTY_VAPID_PRIVATE_KEY: MIGHAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBG0wawIBAQQg7ki2JNeU+GLhnNacatYTpVJNFd3uIKWr+Inj/vYFMAShRANCAAQyUFnxhJ7CSBxmKk5Qj6d0UWOBJ68nwsB+XAxsp4hAJ/mVfmeryWYGKx9JaZaAWBfSybFhK0inH6o1XIJH5CRW # pragma: allowlist secret
      ROOSTY_INSTANCE_NAME: Roosty Development
      ROOSTY_INSTANCE_DESCRIPTION: Local Roosty development instance
      ROOSTY_OBJECT_STORAGE_BACKEND: local
      ROOSTY_MEDIA_ROOT: /var/lib/roosty/media
      ROOSTY_REGISTRATION_MODE: closed
      ROOSTY_WORKER_CONCURRENCY: "4"
      ROOSTY_FEDERATION_ENABLED: "false"
    ports:
      - "3001:3001"
    volumes:
      - roosty-media:/var/lib/roosty/media
    depends_on:
      postgres:
        condition: service_healthy

  elk:
    image: ghcr.io/elk-zone/elk:v1.0.0
    user: "0:0"
    environment:
      NUXT_PUBLIC_DEFAULT_SERVER: roosty.localhost:4000
      NUXT_PUBLIC_SINGLE_INSTANCE: "true"
      NUXT_STORAGE_DRIVER: fs
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    volumes:
      - elk-data:/elk/data
    depends_on:
      - roosty

  caddy:
    build:
      context: ..
      dockerfile: deploy/Caddy.Containerfile
      args:
        PHANPY_VERSION: ${ROOSTY_PHANPY_VERSION:-2026.06.23.05dcc55}
    networks:
      default:
        aliases:
          - roosty.localhost
    ports:
      - "4000:4000"
      - "4001:4001"
      - "4002:4002"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - roosty
      - elk

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: roosty
      POSTGRES_USER: roosty
      POSTGRES_PASSWORD: roosty # pragma: allowlist secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roosty -d roosty"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  caddy-config:
  caddy-data:
  elk-data:
  postgres-data:
  roosty-media:
