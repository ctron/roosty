---
roosty_deploy_dir: /opt/roosty
roosty_elk_enabled: true
roosty_elk_storage_uid: 911
roosty_phanpy_enabled: false
roosty_phanpy_version: 2026.06.23.05dcc55
roosty_docker_packages:
  - docker.io
  - docker-compose-v2
  - openssl
roosty_worker_concurrency: 4
roosty_streaming_max_connections: 1000
roosty_streaming_send_timeout: 10s
roosty_streaming_ping_interval: 30s
roosty_streaming_idle_timeout: 90s
roosty_streaming_event_retention: 1h
